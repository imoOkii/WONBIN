<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>WONBIN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 容器：相对定位，包裹图片和播放键 -->
    <div class="image-wrapper">
        <img src="./image/wonbin.png" alt="WONBIN背景" class="bg-img">
        <!-- 三个播放键，绝对定位在图片上方 -->
        <button class="play-btn play-btn-1" data-track="0" aria-label="播放 WB_yyxf">
            <span class="play-icon"></span>
        </button>
        <button class="play-btn play-btn-2" data-track="1" aria-label="播放 WB_wzhg">
            <span class="play-icon"></span>
        </button>
        <button class="play-btn play-btn-3" data-track="2" aria-label="播放 WB_rmxn">
            <span class="play-icon"></span>
        </button>
    </div>

    <div class="error-tip" id="audioErrorTip"></div>

    <script>
        (function() {
            // 音频文件名（实际文件名，可包含特殊字符，使用 encodeURIComponent 编码）
            const rawNames = ['WB_yyxf', 'WB_wzhg', 'WB_rmxn'];
            const audioFiles = rawNames.map(name => `voice/${encodeURIComponent(name)}.mp3`);

            let currentAudio = null;
            let currentPlayingButton = null;
            const errorTip = document.getElementById('audioErrorTip');

            function showError(msg) {
                if (!errorTip) return;
                errorTip.textContent = msg;
                errorTip.style.opacity = '1';
                setTimeout(() => { errorTip.style.opacity = '0'; }, 2500);
            }

            function stopCurrentPlayback(resetStyle = true) {
                if (currentAudio) { currentAudio.pause(); currentAudio = null; }
                if (currentPlayingButton && resetStyle) {
                    currentPlayingButton.classList.remove('playing');
                    currentPlayingButton = null;
                }
            }

            function playAudioByIndex(index, buttonElement) {
                if (index < 0 || index >= audioFiles.length) { showError('音频索引无效'); return; }
                const filePath = audioFiles[index];
                const displayName = rawNames[index];
                if (currentAudio && currentPlayingButton === buttonElement) {
                    currentAudio.pause();
                    currentAudio.currentTime = 0;
                    currentAudio.play().catch(() => showError(`无法重新播放「${displayName}」`));
                    return;
                }
                stopCurrentPlayback(true);
                const audio = new Audio(filePath);
                audio.preload = 'none';
                audio.addEventListener('error', () => {
                    showError(`🔇 加载失败: ${displayName}.mp3 请检查 voice/ 文件夹`);
                    buttonElement.classList.remove('playing');
                    if (currentAudio === audio) currentAudio = null;
                    if (currentPlayingButton === buttonElement) currentPlayingButton = null;
                });
                audio.addEventListener('ended', () => {
                    if (currentPlayingButton) currentPlayingButton.classList.remove('playing');
                    if (currentAudio === audio) { currentAudio = null; currentPlayingButton = null; }
                });
                audio.play().then(() => {
                    buttonElement.classList.add('playing');
                    currentAudio = audio;
                    currentPlayingButton = buttonElement;
                }).catch(() => showError(`▶️ 播放失败「${displayName}」, 请检查文件`));
            }

            const btn1 = document.querySelector('.play-btn-1');
            const btn2 = document.querySelector('.play-btn-2');
            const btn3 = document.querySelector('.play-btn-3');
            if (btn1) btn1.addEventListener('click', () => playAudioByIndex(0, btn1));
            if (btn2) btn2.addEventListener('click', () => playAudioByIndex(1, btn2));
            if (btn3) btn3.addEventListener('click', () => playAudioByIndex(2, btn3));

            window.addEventListener('beforeunload', () => { if (currentAudio) currentAudio.pause(); });
        })();
    </script>
</body>
</html>
